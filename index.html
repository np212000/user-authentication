<body>

<div id="container">

<div id="page">

<div id="login" class = "animate__animated animate__flipInY">

<h1 align = "center">Login</h1>	

<form id = "login_frm" autocomplete = "off">
	
<input type = "email" name = "email" placeholder = "Email Id" id = "login_email" required = "required">
<small id = "login_email_war"><i class="fas fa-exclamation-triangle"></i> Email id not registered....</small>

<input type = "password" name = "password" placeholder = "Password" id = "login_password" autocomplete = "autocomplete"
required = "required"><small id = "login_password_war"><i class="fas fa-exclamation-triangle"></i> Wrong Password...</small>

<button type = "submit" id = "login_btn">Login</button>	
</form>

<p>Don't have a Account ? <span id = "span_one" onclick = "ponda()">Sing Up</span></p>

</div>

<div id="signup" class = "animate__animated animate__flipInY">

<h1 align = "center">Sign-Up</h1>	

<form id = "signup_frm" autocomplete = "off">
	
<input type = "text" name = "username" id = "username" placeholder = "Name" required = "required" autocomplete = "off">

<input type = "email" name = "email" placeholder = "email" id = "email" required = "required" autocomplete = "off">
<small id = "email_notice"><i class="fas fa-exclamation-triangle"></i>
Email id Alredy Exist</small>

<input type = "number" name = "no" placeholder = "Phone" id = "phone" required = "required" autocomplete = "off">

<input type = "password" name = "password" placeholder = "Password" id = "password" required = "required" 
autocomplete = "off"><small id = "pass_war"><i class="fas fa-exclamation-triangle"></i>
Password Should have 8 Character</small>

<button type = "submit" id = "signup_btn">Sign-Up</button>	

</form>

<p>Already have a Account ? <span id = "span_two" onclick = "np()">Login</span></p>

</div>

</div>	

</div>
