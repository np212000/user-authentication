<!DOCTYPE html>
<html>
<head>

<title>Web Application Development Profile page</title>	
	<meta charset="utf-8">
	<meta lang = "eng-US">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="stylesheet" type="text/css" href="profile.css">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>

<div id="container">

<div id="page_cover">

<div id="profile_box">
	
<div id="profile_pic">
	
<i class="fas fa-user" id = "profile_icon"></i>
<input type = "file" accept="image/*" id = "profile_upload">

</div>

<p id = "upp">Upload Profile Pic</p>
<h1 id = "profile_name"></h1>
<button  id = "next">Next <i class = "fas fa-angle-double-right"></i></button>	

</div>
	
</div>

</div>

<!--main profile coding-->

<div id="main_profile_page">
	
<div id="profile_header">
	
<div id="profile_picture">
	
</div>


</div>

<h1 id = "profile_username"></h1>

<div id="app">
	
<div id="contact">
<i class = "fas fa-address-book"></i>
<p>Contact</p>	
</div>


<div id="player">
<i class = "fas fa-play-circle"></i>	
<p>Player</p>
</div>


<div id="logout">

</div>

</div>

<div id="profile_footer">

</div>

</div>
