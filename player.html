<!DOCTYPE html>
<html>
<head>

<title>
Vdo Player	
</title>	

	<meta charset = "utf-8">
	<meta lang = "eng-US">
	<meta name = "viewport" content="width=device-width, initial-scale=1">

<link rel = "stylesheet" type = "text/css" href = "player.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>


</head>
<body>

<div id="left">
	
<video id = "vdo_player">
<source src="https://videos.pexels.com/video-files/3826741/3826741-sd_960_506_25fps.mp4" id = "v_src"></source>	
</video>

<div id="progress_box">
<div id="progress_bar"></div>	
</div>

<div id="control">
	
<div id="timing">
<p id = "v_timing">00:00/00:00</p>	
</div>

<div id="play_tools">
<i class="fas fa-angle-double-left" id = "left_btn"></i>
<i class="fas fa-play-circle" id = "play_btn"></i>	
<i class="fas fa-angle-double-right" id = "right_btn"></i>	
</div>

<div id="other_tools">

<div id="vol_box">

<input type="range" min = "0" max = "1" step = "0.01" id = "vol_control" style = "display: none;">	
<i class="fas fa-volume-up" id = "volume"></i>

</div>


<div id="speed_box">

<input type="range" min = "0" max = "2" step = "0.25" id = "speed_control" style = "display: none;">	
<i class="fas fa-tachometer-alt" id = "speed_icon"></i>

</div>

<i class="fas fa-expand" id = "full_screen"></i>
</div>


</div>

</div>






<div id="right">
	
<div id="top">

<h3>Playlist</h3>

<input type="search" placeholder="Search Your videos Here..." id = "search">

<i class="fas fa-plus-circle" id = "open_d_box"></i>
<div id="add_vdo_box">
<h2>Add Videos</h2>
<form>
<input type="text" placeholder="Enter Your Video Name..." id = "v_name">
<input type="text" placeholder="Enter Your Video Link" id = "v_link">
<button type = "submit" id = "add_vdo_btn">Add</button>
</form>
</div>

</div>


<div id="bottom">



</div>

</div>










<script type="text/javascript" src = "player.js"></script>

	
</body>
</html>
